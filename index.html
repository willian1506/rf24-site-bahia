<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF24 PRO - Salvador FC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a2030, #091d2a);
  color: white;
}

/* ---------------- SPLASH ---------------- */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a2030, #091d2a);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.splash-content {
  text-align: center;
}

.splash-content img {
  width: 180px;
  margin-bottom: 20px;
  border-radius: 20px; /* ARREDONDADO */
  animation: float 3s infinite ease-in-out;
}

.splash-content button {
  background: #c62828;
  color: white;
  font-size: 18px;
  padding: 10px 25px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ---------------- HEADER ---------------- */
header {
  text-align: center;
  padding: 20px;
  background: #1976d2;
}

/* ---------------- BOTÕES ---------------- */
.top-buttons {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 300; /* GARANTE QUE FICA POR CIMA */
  display: flex;
  gap: 5px;
}

button {
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  border: none;
}

.admin-btn { background: #c62828; color:white; }
.logout-btn { background: #ffffff; color:#c62828; }

/* ---------------- CONTAINER ---------------- */
.container { padding: 20px; }

/* ---------------- CARDS ---------------- */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  width: 180px;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  background: linear-gradient(145deg, #1976d2, #0a2030);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* ---------------- TECNICO ---------------- */
.coach {
  margin-top: 30px;
  text-align: center;
}

.coach img {
  width: 150px;
  border-radius: 15px;
  margin-top: 10px;
}

/* ---------------- LOGIN ---------------- */
.login {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000000dd;
  display:flex; justify-content:center; align-items:center;
  z-index: 200;
}
.login-box {
  background:#0a2030; padding:20px; border-radius:15px; text-align:center;
}

/* ---------------- ADMIN PANEL ---------------- */
.admin-panel {
  position: fixed;
  right: -400px;
  top:0;
  width:380px;
  height:100%;
  background:#0a2030;
  padding:20px;
  transition:0.3s;
  overflow:auto;
  z-index:150;
  border-radius:15px 0 0 15px;
}

.admin-panel.active {
  right:0;
  box-shadow: -5px 0 20px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-content">
    <img src="https://images-ext-1.discordapp.net/external/p5eaHKQJ5fDQDwNOpt_FUbXYbgxc7iWP652F5kmDZKs/%3Fsize%3D2048/https/cdn.discordapp.com/icons/1444161827113140226/3d299d4be752faf8374189e5c4a05f4d.png?format=webp&quality=lossless">
    <h1>Esporte Clube Salvador 1941</h1>
    <button onclick="enterSite()">Entrar</button>
  </div>
</div>

<!-- BOTÕES -->
<div class="top-buttons">
  <button class="admin-btn" onclick="openLogin()">Admin</button>
  <button class="logout-btn" onclick="logout()">Sair</button>
</div>

<!-- HEADER -->
<header>
  <h1 id="teamName">Esporte Clube Salvador</h1>
</header>

<div class="container">

<h2>👥 Jogadores</h2>
<div class="cards" id="players"></div>

<!-- TECNICO -->
<div class="coach">
  <h2>🎮 Técnico</h2>
  <h3>MonkeyWsp0</h3>
  <img src="https://media.discordapp.net/attachments/1442635394561867968/1487975263789650063/gfx1_mkz.png">
</div>

</div>

<!-- LOGIN -->
<div class="login" id="loginBox" style="display:none;">
  <div class="login-box">
    <h3>Login Admin</h3>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">
<h3>Painel PRO</h3>
<input id="nomeJogador" placeholder="Nome">
<input id="imgJogador" placeholder="Imagem">
<input id="ovr" placeholder="Overall">
<button onclick="addPlayer()">Adicionar</button>
</div>

<script>
// SPLASH
function enterSite(){
  document.getElementById("splash").style.display="none";
}

// LOGIN
const ADMIN_USER="admin";
const ADMIN_PASS="123";

function openLogin(){
  document.getElementById("loginBox").style.display="flex";
}

function login(){
  let u=user.value;
  let p=pass.value;

  if(u===ADMIN_USER && p===ADMIN_PASS){
    loginBox.style.display="none";
    adminPanel.classList.add("active");
  } else alert("Erro!");
}

function logout(){
  adminPanel.classList.remove("active");
}

// DADOS
let data = {players:[]};

function render(){
  players.innerHTML="";
  data.players.forEach(p=>{
    players.innerHTML+=`
      <div class="card">
        <h3>${p.nome}</h3>
        <img src="${p.img}">
        <p>OVR: ${p.ovr}</p>
      </div>
    `;
  });
}

function addPlayer(){
  data.players.push({
    nome:nomeJogador.value,
    img:imgJogador.value,
    ovr:ovr.value
  });
  render();
}

render();
</script>

</body>
</html>
